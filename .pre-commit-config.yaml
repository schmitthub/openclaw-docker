repos:
  # Pre-commit hooks — basic hygiene (trailing whitespace, EOL, YAML syntax, merge conflicts, private keys)
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0 # Use the ref you want to point at
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-merge-conflict
      - id: detect-private-key
        exclude: ^tests/

  # Prettier — format TS/JS/JSON/YAML/MD (reads .prettierrc + .prettierignore)
  - repo: local
    hooks:
      - id: prettier
        name: prettier
        entry: npx prettier --write --ignore-unknown
        language: system
        types_or: [ts, javascript, json, yaml, markdown]

  # ESLint — lint + autofix TS/JS (uses project eslint.config.mjs)
  - repo: local
    hooks:
      - id: eslint
        name: eslint
        entry: npx eslint --fix
        language: system
        types_or: [ts, javascript]

  # Gitleaks — secret scanning (reads .gitleaks.toml)
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.0
    hooks:
      - id: gitleaks

  # TypeScript type check
  - repo: local
    hooks:
      - id: typecheck
        name: typecheck
        entry: npx tsc --noEmit
        language: system
        types: [ts]
        pass_filenames: false

  # Vitest — run tests
  - repo: local
    hooks:
      - id: vitest
        name: vitest
        entry: npx vitest run
        language: system
        types: [ts]
        pass_filenames: false

  # ShellCheck — lint shell scripts
  - repo: https://github.com/koalaman/shellcheck-precommit
    rev: v0.10.0
    hooks:
      - id: shellcheck
        args: ["-e", "SC1091"] # ignore sourced file not found (conf file)

  # Semgrep — SAST for IaC (uses .semgrep/ + p/security-audit rulesets)
  - repo: local
    hooks:
      - id: semgrep
        name: Semgrep SAST
        # Expected version: 1.146.0 (must match CI image tag in security.yml)
        entry: semgrep scan --config .semgrep/ --config p/security-audit --error
        language: system
        types: [ts]
        pass_filenames: false
