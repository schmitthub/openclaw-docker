# Generated by openclaw-deploy. Do not edit directly.
#
# Envoy egress-only proxy: transparent TLS proxy.
# Ingress is handled by Tailscale (no ingress listener here).
# Egress uses TLS Inspector + SNI-based domain whitelist. No MITM / TLS termination.
# All outbound TCP from the sidecar/gateway is redirected here by iptables in sidecar-entrypoint.sh.
# UDP is NOT proxied — the sidecar's iptables owner-match rules restrict UDP to root (tailscaled) only.
# Restart after editing: docker restart envoy

static_resources:
  listeners:
    # Egress: transparent TLS proxy with SNI-based domain whitelist.
    # All outbound TCP from the gateway is redirected here by iptables.
    # TLS Inspector reads SNI from ClientHello.
    # Whitelisted SNI -> forwarded. Everything else -> connection refused.
    - name: egress
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 10000
      listener_filters:
        - name: envoy.filters.listener.tls_inspector
          typed_config:
            "@type": type.googleapis.com/envoy.extensions.filters.listener.tls_inspector.v3.TlsInspector
      filter_chains:
        # Whitelisted TLS domains — passthrough (matched by SNI from ClientHello).
        - filter_chain_match:
            server_names:
              - "clawhub.com"
              - "registry.npmjs.org"
              - "api.anthropic.com"
              - "api.openai.com"
              - "generativelanguage.googleapis.com"
              - "openrouter.ai"
              - "api.x.ai"
              - "github.com"
              - "*.githubusercontent.com"
              - "ghcr.io"
              - "formulae.brew.sh"
              - "proxy.golang.org"
              - "sum.golang.org"
              - "storage.googleapis.com"
              - "cdn.discordapp.com"
              - "discord.com"
              - "*.discord.com"
              - "gateway.discord.gg"
              - "*.discord.gg"
              - "*.discord.media"

          filters:
            - name: envoy.filters.network.sni_dynamic_forward_proxy
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.sni_dynamic_forward_proxy.v3.FilterConfig
                port_value: 443
                dns_cache_config:
                  name: dynamic_forward_proxy_cache
                  dns_lookup_family: V4_PREFERRED
            - name: envoy.filters.network.tcp_proxy
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.tcp_proxy.v3.TcpProxy
                stat_prefix: egress_tls_allowed
                cluster: dynamic_forward_proxy_cluster
                idle_timeout: 0s
        # Default deny: non-whitelisted SNI or non-TLS traffic.
        # Connection is immediately reset (deny_cluster has no endpoints).
        - filters:
            - name: envoy.filters.network.tcp_proxy
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.tcp_proxy.v3.TcpProxy
                stat_prefix: egress_denied
                cluster: deny_cluster
                idle_timeout: 0s

  clusters:
    - name: dynamic_forward_proxy_cluster
      lb_policy: CLUSTER_PROVIDED
      cluster_type:
        name: envoy.clusters.dynamic_forward_proxy
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.clusters.dynamic_forward_proxy.v3.ClusterConfig
          dns_cache_config:
            name: dynamic_forward_proxy_cache
            dns_lookup_family: V4_PREFERRED
      upstream_connection_options:
        tcp_keepalive:
          keepalive_time: 60
          keepalive_interval: 10
          keepalive_probes: 3

    - name: deny_cluster
      type: STATIC
      connect_timeout: 0.25s
      load_assignment:
        cluster_name: deny_cluster
