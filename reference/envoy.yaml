# Generated by openclaw-deploy. Do not edit directly.
#
# Envoy egress-only proxy: transparent TLS proxy + DNS forwarder.
# Ingress is handled by Tailscale (no ingress listener here).
# Egress uses TLS Inspector + SNI-based domain whitelist. No MITM / TLS termination.
# All outbound TCP from the gateway is DNAT'd here by iptables in entrypoint.sh.
# Restart after editing: docker restart envoy

static_resources:
  listeners:
    # Egress: transparent TLS proxy with SNI-based domain whitelist.
    # All outbound TCP from the gateway is DNAT'd here by iptables.
    # TLS Inspector reads SNI from ClientHello.
    # Whitelisted SNI -> forwarded. Everything else -> connection refused.
    - name: egress
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 10000
      listener_filters:
        - name: envoy.filters.listener.tls_inspector
          typed_config:
            "@type": type.googleapis.com/envoy.extensions.filters.listener.tls_inspector.v3.TlsInspector
      filter_chains:
        # Whitelisted TLS domains — passthrough (matched by SNI from ClientHello).
        - filter_chain_match:
            server_names:
              - "clawhub.com"
              - "registry.npmjs.org"
              - "api.anthropic.com"
              - "api.openai.com"
              - "generativelanguage.googleapis.com"
              - "openrouter.ai"
              - "api.x.ai"
              - "github.com"
              - "*.githubusercontent.com"
              - "ghcr.io"
              - "formulae.brew.sh"
              - "tailscale.com"
              - "login.tailscale.com"
              - "controlplane.tailscale.com"
              - "log.tailscale.com"
              - "cdn.discordapp.com"
              - "discord.com"
              - "gateway.discord.gg"
              - "*.api.letsencrypt.org"
              - "derp1.tailscale.com"
              - "derp2.tailscale.com"
              - "derp3.tailscale.com"
              - "derp4.tailscale.com"
              - "derp5.tailscale.com"
              - "derp6.tailscale.com"
              - "derp7.tailscale.com"
