# Mirrors the VPS deployment topology:
#   - internal network (internal: true, no default internet route)
#   - egress network (Envoy's internet path)
#   - Envoy on both networks (sole bridge, SNI whitelist for TCP egress)
#   - Tailscale sidecar on internal only (owns netns, runs iptables + tailscaled)
#   - Gateway shares sidecar's netns (network_mode: container:tailscale-sidecar)
#   - CLI service for running config/onboard commands (standalone, no network dep)

services:
  envoy:
    image: envoyproxy/envoy:v1.33-latest
    restart: unless-stopped
    environment:
      ENVOY_UID: ${ENVOY_UID:-101}
    network_mode: service:tailscale-sidecar
    volumes:
      - ./envoy.yaml:/etc/envoy/envoy.yaml:ro
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/10000"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    depends_on:
      tailscale-sidecar:
        condition: service_healthy

  # Tailscale sidecar — owns the network namespace shared with the gateway.
  # Handles all networking: iptables REDIRECT to Envoy, UDP owner-match, tailscaled.
  tailscale-sidecar:
    image: tailscale/tailscale:v1.94.2
    hostname: openclaw
    cap_add:
      - NET_ADMIN
    environment:
      TS_AUTHKEY: ${TS_AUTHKEY:-}
      TS_STATE_DIR: /var/lib/tailscale
      TS_USERSPACE: false
      TS_SERVE_CONFIG: /config/serve-config.json
      TS_ENABLE_HEALTH_CHECK: "true"
    restart: unless-stopped
    volumes:
      - tailscale-state:/var/lib/tailscale
      - ${PWD}/ts-config/config:/config
      - ${PWD}/sidecar-entrypoint.sh:/usr/local/bin/sidecar-entrypoint.sh:ro
    devices:
      - /dev/net/tun:/dev/net/tun
    dns:
      - 1.1.1.2
      - 1.0.0.2
    entrypoint: ["sidecar-entrypoint.sh"]
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q --spider http://localhost:9002/healthz || wget -q --spider http://127.0.0.1:9002/healthz",
        ]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 45s

  openclaw-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    image: openclaw-gateway:local
    network_mode: service:tailscale-sidecar
    environment:
      HOME: /home/node
      TERM: xterm-256color
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      BRAVE_API_KEY: ${BRAVE_API_KEY:-}
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN:-}
      DISCORD_USER_ID: ${DISCORD_USER_ID:-}
      DISCORD_SERVER_ID: ${DISCORD_SERVER_ID:-}
    init: true
    restart: unless-stopped
    command:
      ["openclaw", "gateway", "run", "--bind", "loopback", "--port", "18789"]
    volumes:
      - openclaw-home:/home/node
      - openclaw-linuxbrew:/home/linuxbrew/.linuxbrew
      - ${OPENCLAW_CONFIG_DIR:-./data/config}:/home/node/.openclaw
      - ${OPENCLAW_WORKSPACE_DIR:-./data/workspace}:/home/node/.openclaw/workspace
      - ${PWD}/Corefile:/etc/coredns/Corefile:ro
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:18789/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      tailscale-sidecar:
        condition: service_healthy
      envoy:
        condition: service_healthy

  # Standalone CLI for running config/onboard commands against shared volumes.
  # No network dependency on gateway — runs independently.
  openclaw-cli:
    build:
      context: .
      dockerfile: Dockerfile
    image: openclaw-gateway:local
    network_mode: none
    environment:
      HOME: /home/node
      TERM: xterm-256color
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-}
      BROWSER: echo
    volumes:
      - openclaw-home:/home/node
      - openclaw-linuxbrew:/home/linuxbrew/.linuxbrew
      - ${OPENCLAW_CONFIG_DIR:-./data/config}:/home/node/.openclaw
      - ${OPENCLAW_WORKSPACE_DIR:-./data/workspace}:/home/node/.openclaw/workspace
    stdin_open: true
    tty: true
    init: true
    entrypoint: ["openclaw"]
    profiles:
      - cli

volumes:
  openclaw-home:
  openclaw-linuxbrew:
  tailscale-state:
